name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-api:
    name: "API: Lint, Type-Check, Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_pass
          POSTGRES_DB: rag_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag_user -d rag_pipeline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type-check with mypy
        run: mypy src/

      - name: Run tests
        env:
          RAG_DATABASE_URL: postgresql+asyncpg://rag_user:rag_pass@localhost:5432/rag_pipeline
        run: pytest tests/ -v

  lint-and-test-web:
    name: "Web: Lint, Type-Check, Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm vitest run

  docker-build:
    name: "Docker: Build Images"
    runs-on: ubuntu-latest
    needs: [lint-and-test-api, lint-and-test-web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t rag-pipeline-api apps/api/

      - name: Build Web image
        run: docker build -t rag-pipeline-web apps/web/
